# Installed on the box at /etc/nginx/conf.d/orbit-upstream.conf
# (http level — nginx.conf includes conf.d/*.conf there; the per-app location
# lives separately in conf.d/apps/orbit.conf at server level).
#
# Zero-downtime deploys: blue (8766) is the canonical instance; green (8866) is
# a transient holder spun up only during a deploy. nginx sends everything to
# blue; the instant blue stops answering (during its restart onto new code) it
# transparently RETRIES the request on the green backup (see proxy_next_upstream
# in the location) — so no client ever sees a 502. When blue is back,
# fail_timeout lets nginx return to it. No per-deploy nginx reloads.
upstream hd_backend {
    server 127.0.0.1:8766 max_fails=1 fail_timeout=3s;  # blue — primary
    server 127.0.0.1:8866 backup;                       # green — deploy holder
}
